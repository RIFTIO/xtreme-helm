# this shows how to reset the storage for all pods
# it is also possible to set the storage classes for each SDNC pod separately 
# for some reason local-path does not work for the pvcmetadata.storageClass
global:
  pvcmetadata:
    storageClass: local-path

    pceNetconfConfigmgr:
      storageClass: local-path

    logPceNetconfConfigmgr:
      storageClass: local-path

    persistence:
      storageClass: local-path

    persistenceFtp:
      storageClass: local-path

mongodb:
  mongoStorage:
    storageClassName: local-path

prometheus:
  prometheusStorage:
    storageClassName: local-path

redis:
  redisStorage:
    storageClassName: local-path

launchpad:
  storage:
    storageClassName: local-path

grafana:
  grafanaStorage:
    storageClassName: local-path
