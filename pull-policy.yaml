# Values override file: sets pullPolicy: Never everywhere it appears.
# Usage: helm install <release> ./xtreme -f Never-values.yaml
#        helm upgrade  <release> ./xtreme -f Never-values.yaml

# ── Top-level chart (values.yaml) ──────────────────────────────────────────

global:
  kubectl:
    image:
      pullPolicy: Never
  busybox:
    image:
      pullPolicy: Never

# ── nats sub-chart ─────────────────────────────────────────────────────────

nats:
  image:
    pullPolicy: Never
  exporter:
    image:
      pullPolicy: Never

# ── zms sub-chart ──────────────────────────────────────────────────────────

zms:
  initContainer:
    waitForDep:
      image:
        pullPolicy: Never
  image:
    pullPolicy: Never
  mariadb:
    pullPolicy: Never

# ── redis sub-chart ────────────────────────────────────────────────────────

redis:
  image:
    pullPolicy: Never
  redTunnel:
    image:
      pullPolicy: Never
  exporter:
    image:
      pullPolicy: Never

# ── mongodb sub-chart ──────────────────────────────────────────────────────

mongodb:
  replicator:
    image:
      pullPolicy: Never
  image:
    pullPolicy: Never
  externalAccess:
    autoDiscovery:
      image:
        pullPolicy: Never
  volumePermissions:
    image:
      pullPolicy: Never
  metrics:
    image:
      pullPolicy: Never

# ── prometheus sub-chart ───────────────────────────────────────────────────

prometheus:
  replicator:
    image:
      pullPolicy: Never
  prometheus:
    image:
      pullPolicy: Never
    configWatch:
      image:
        pullPolicy: Never
    pushGateway:
      image:
        pullPolicy: Never

# ── grafana sub-chart ──────────────────────────────────────────────────────

grafana:
  grafana:
    image:
      pullPolicy: Never

# ── sftp sub-chart ─────────────────────────────────────────────────────────

sftp:
  image:
    pullPolicy: Never

# ── ftp sub-chart ──────────────────────────────────────────────────────────

ftp:
  image:
    pullPolicy: Never

# ── postgres sub-chart ─────────────────────────────────────────────────────

postgres:
  image:
    pullPolicy: Never

# ── inas2-fe sub-chart ─────────────────────────────────────────────────────

inas2-fe:
  image:
    pullPolicy: Never

# ── inas2-be sub-chart ─────────────────────────────────────────────────────

inas2-be:
  initContainer:
    waitForDep:
      image:
        pullPolicy: Never
  image:
    pullPolicy: Never

# ── llm-stack sub-chart ────────────────────────────────────────────────────

llm-stack:
