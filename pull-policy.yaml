      image:
        pullPolicy: Never
    operator:
      image:
        pullPolicy: Never
    metrics:
      image:
        pullPolicy: Never

  # explore/charts/explore-application
  explore-application:
    image:
      pullPolicy: Never

  # explore/charts/airflow
  airflow:
    dags:
      image:
        pullPolicy: Never
    web:
      image:
        pullPolicy: Never
    scheduler:
      image:
