# ── launchpad sub-chart (and its sub-charts) ───────────────────────────────

launchpad:
  # launchpad/values.yaml
  image:
    pullPolicy: Never
  initContainer:
    waitForDep:
      image:
        pullPolicy: Never
  launchpad:
    image:
      pullPolicy: Never
    primitiveExec:
      image:
        pullPolicy: Never

  # launchpad/charts/aeo/values.yaml
  aeo:
    initContainer:
      waitForDep:
        image:
          pullPolicy: Never
    image:
      controller:
        pullPolicy: Never
      serviceWorker:
        pullPolicy: Never
      resourceWorker:
        pullPolicy: Never
      tmfServer:
        pullPolicy: Never
      scriptExec:
        pullPolicy: Never

  # launchpad/charts/haproxy-ingress/values.yaml
  haproxy-ingress:
    initContainer:
      waitForDep:
        image:
          pullPolicy: Never
    image:
      pullPolicy: Never
    exporter:
      image:
        pullPolicy: Never
    defaultbackend:
      image:
        pullPolicy: Never

  # launchpad/charts/loki/values.yaml
  loki:
    image:
      pullPolicy: Never

  # launchpad/charts/alertmgr/values.yaml
  alertmgr:
    alertmgr:
      image:
        pullPolicy: Never

  # launchpad/charts/cluster_logger/values.yaml
  cluster_logger:
    image:
      pullPolicy: Never
    initContainer:
      waitForDep:
        image:
          pullPolicy: Never

