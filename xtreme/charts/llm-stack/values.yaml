# When used as subchart, namespace comes from global.namespace.name
# When standalone, set createNamespace: true and namespace below
createNamespace: false

# Global image settings
global:
  imageRegistry: rt.cloud.dzsi.local/docker/subin

# Ollama configuration
ollama:
  enabled: true
  image:
    repository: ollama-with-ministral
    tag: "2.0"
    pullPolicy: IfNotPresent

  replicas: 1

  # Resource configuration
  resources:
    requests:
      cpu: "8"
      memory: "4Gi"
    limits:
      cpu: "16"
      memory: "8Gi"

  # Security context
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # Service configuration
  service:
    type: ClusterIP
    port: 11434

  # Storage configuration
  storage:
    size: 30Gi
    storageClassName: local-path
    hostPath: /mnt/data
    accessMode: ReadWriteOnce

  # Init container settings
  initContainer:
    enabled: true
    seedPath: /opt/baked-models

# Open WebUI configuration
openWebui:
  enabled: true
  image:
    repository: open-webui-xtreme
    tag: "0.6.43"
    pullPolicy: IfNotPresent

  replicas: 1

  # Resource configuration
  resources:
    requests:
      cpu: "4"
      memory: "4Gi"
    limits:
      cpu: "8"
      memory: "8Gi"

  # Environment variables
  env:
    ollamaBaseUrl: "http://ollama:11434"
    defaultModel: "XTREME Service Primitive Generator"

  # Service configuration
  service:
    type: LoadBalancer
    port: 80
    targetPort: 8080

  # Storage configuration
  storage:
    size: 10Gi
    storageClassName: local-path
    hostPath: /mnt/data
    accessMode: ReadWriteOnce

  # Init container settings
  initContainer:
    enabled: true
    seedPath: /app/backend/data-seed

# PersistentVolume configuration
persistentVolumes:
  enabled: true
  reclaimPolicy: Retain
