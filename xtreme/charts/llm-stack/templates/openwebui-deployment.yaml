{{- if .Values.openWebui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: {{ .Values.global.namespace.name }}
  labels:
    app: open-webui
    {{- include "llm-stack.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.openWebui.replicas }}
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      {{- if .Values.openWebui.initContainer.enabled }}
      # InitContainer: seeds the PVC from the baked webui model only once
      initContainers:
      - name: seed-open-webui-data
        image: {{ include "llm-stack.openwebui.image" . }}
        imagePullPolicy: {{ .Values.openWebui.image.pullPolicy }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            if [ ! -d /data/uploads ] || [ -z "$(ls -A /data/uploads 2>/dev/null)" ]; then
              echo "Seeding XTREME custom model into PVC..."
              cp -a {{ .Values.openWebui.initContainer.seedPath }}/. /data/
            else
              echo "Model already present; skipping copy."
            fi
        volumeMounts:
        - name: open-webui-storage
          mountPath: /data
      {{- end }}

      containers:
      - name: open-webui
        image: {{ include "llm-stack.openwebui.image" . }}
        imagePullPolicy: {{ .Values.openWebui.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.openWebui.service.targetPort }}
        env:
        # -----------------------------
        # Core OpenWebUI settings
        # -----------------------------
        - name: OLLAMA_BASE_URL
          value: {{ .Values.openWebui.env.ollamaBaseUrl | quote }}
        - name: DEFAULT_MODEL
          value: {{ .Values.openWebui.env.defaultModel | quote }}
        - name: GLOBAL_LOG_LEVEL
          value: DEBUG
        - name: WEBUI_AUTH_AUTO_APPROVE
          value: "true"
        - name: DEFAULT_USER_ROLE
          value: "admin"
        - name: ENABLE_PERSISTENT_CONFIG
          value: "false"
        # -----------------------------
        # OAuth / OIDC – Xtreme
        # -----------------------------
        {{- if .Values.openWebui.env.oauth.enabled }}

        - name: WEBUI_URL
          value: "{{ .Values.openWebui.env.oauth.webui.scheme }}://{{ .Values.openWebui.env.oauth.webui.host }}"

        - name: ENABLE_OAUTH_SIGNUP
          value: {{ .Values.openWebui.env.oauth.enableSignup | quote }}

        - name: WEBUI_SECRET_KEY
          value: {{ .Values.openWebui.env.oauth.webuiSecretKey | quote }}

        - name: ENABLE_LOGIN_FORM
          value: {{ .Values.openWebui.env.oauth.enableLoginForm | quote }}

        - name: OAUTH_PROVIDER_NAME
          value: {{ .Values.openWebui.env.oauth.providerName | quote }}

        - name: OAUTH_CLIENT_ID
          value: {{ .Values.openWebui.env.oauth.clientId | quote }}

        - name: OPENID_PROVIDER_URL
          value: >-
                https://{{ .Values.openWebui.env.oauth.provider.serviceName }}:{{ .Values.openWebui.env.oauth.provider.port }}/.well-known/openid-configuration

        - name: OAUTH_SCOPES
          value: {{ .Values.openWebui.env.oauth.scopes | quote }}

        - name: OAUTH_REDIRECT_URI
          value: "{{ .Values.openWebui.env.oauth.webui.scheme }}://{{ .Values.openWebui.env.oauth.webui.host }}/oauth/oidc/callback"

        - name: OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.openWebui.env.oauth.clientSecret.name }}
              key: {{ .Values.openWebui.env.oauth.clientSecret.key }}
        
        {{- if .Values.openWebui.env.oauth.tls.existingSecret.enabled }}
        - name: SSL_CERT_FILE
          value: "{{ .Values.openWebui.env.oauth.tls.existingSecret.mountPath }}/{{ .Values.openWebui.env.oauth.tls.existingSecret.certFile }}"

        - name: REQUESTS_CA_BUNDLE
          value: "{{ .Values.openWebui.env.oauth.tls.existingSecret.mountPath }}/{{ .Values.openWebui.env.oauth.tls.existingSecret.certFile }}"

        - name: CURL_CA_BUNDLE
          value: "{{ .Values.openWebui.env.oauth.tls.existingSecret.mountPath }}/{{ .Values.openWebui.env.oauth.tls.existingSecret.certFile }}"
        {{- end }}

        {{- end }}
        
        resources:
          requests:
            cpu: {{ .Values.openWebui.resources.requests.cpu | quote }}
            memory: {{ .Values.openWebui.resources.requests.memory }}
          limits:
            cpu: {{ .Values.openWebui.resources.limits.cpu | quote }}
            memory: {{ .Values.openWebui.resources.limits.memory }}
        volumeMounts:
        - name: open-webui-storage
          mountPath: /app/backend/data
        {{- if .Values.openWebui.env.oauth.tls.existingSecret.enabled }}
        - name: xtreme-ca-cert
          mountPath: {{ .Values.openWebui.env.oauth.tls.existingSecret.mountPath }}
          readOnly: true
        {{- end }}

      volumes:
      - name: open-webui-storage
        persistentVolumeClaim:
          claimName: open-webui-storage
      
      {{- if .Values.openWebui.env.oauth.tls.existingSecret.enabled }}
      - name: xtreme-ca-cert
        secret:
          secretName: {{ .Values.openWebui.env.oauth.tls.existingSecret.name }}
      {{- end }}
{{- end }}
