apiVersion: v1
kind: Secret
metadata:
  name: dzs-secret
  namespace: {{ .Values.global.namespace.name }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"docker.io\":{\"username\":\"dzscloudadmin\",\"password\":\"%s\",\"email\":\"noreply@zhone.com\",\"auth\":\"%s\"}}}" .Values.global.dockerhubToken (printf "%s:%s" "dzscloudadmin" .Values.global.dockerhubToken | b64enc) | b64enc }}
